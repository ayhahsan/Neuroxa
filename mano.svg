<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mano mascot">
  <defs>
    <linearGradient id="manoBody" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#EBFF6B"/>
      <stop offset="55%" stop-color="#DAFF3D"/>
      <stop offset="100%" stop-color="#A8C920"/>
    </linearGradient>
    <radialGradient id="manoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DAFF3D" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#DAFF3D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft glow halo -->
  <circle cx="120" cy="125" r="115" fill="url(#manoGlow)"/>

  <!-- Faint grid lines (technical aesthetic) -->
  <g opacity="0.18" stroke="#DAFF3D" stroke-width="0.6">
    <line x1="0" y1="55" x2="240" y2="55"/>
    <line x1="0" y1="195" x2="240" y2="195"/>
    <line x1="40" y1="0" x2="40" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="240"/>
  </g>

  <!-- Floating bits / pixels -->
  <rect x="32" y="62" width="6" height="6" fill="#DAFF3D" opacity="0.75"/>
  <rect x="200" y="74" width="4" height="4" fill="#DAFF3D" opacity="0.65"/>
  <rect x="204" y="178" width="5" height="5" fill="#DAFF3D" opacity="0.55"/>
  <rect x="34" y="186" width="4" height="4" fill="#DAFF3D" opacity="0.6"/>

  <!-- Hexagonal main body -->
  <path d="M 120,46
           L 184,82
           L 184,162
           L 120,198
           L 56,162
           L 56,82 Z"
        fill="url(#manoBody)"
        stroke="#1F2A00"
        stroke-width="2.5"/>

  <!-- Internal facet line — gives depth -->
  <path d="M 120,46 L 120,198"
        stroke="#1F2A00" stroke-width="1" opacity="0.12"/>

  <!-- Top inner highlight -->
  <path d="M 120,52 L 178,86 L 120,86 Z"
        fill="white" opacity="0.18"/>

  <!-- Angle bracket eyes  < > -->
  <polyline points="100,108 88,122 100,136"
            stroke="#1F2A00" stroke-width="5"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="140,108 152,122 140,136"
            stroke="#1F2A00" stroke-width="5"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Determined mouth — short horizontal line -->
  <line x1="108" y1="160" x2="132" y2="160"
        stroke="#1F2A00" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Tiny status indicator dot (active LED feel) -->
  <circle cx="120" cy="74" r="2.5" fill="#1F2A00"/>
</svg>